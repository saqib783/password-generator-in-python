<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h2>Python Password Generator</h2>
        
        <div class="options">
            <label for="passLength">Password Length:</label>
            <input type="number" id="passLength" min="6" max="32" value="12">
            
            <br><br>
            
            <label for="includeSymbols">Include Special Characters:</label>
            <input type="checkbox" id="includeSymbols" checked>
        </div>
        
        <br>
        <input type="text" id="passwordBox" placeholder="Your Password" readonly>
        <button id="genBtn">Generate Password</button>
        <p id="textShow"></p>
    </div>
    
    <script src="/static/script.js?v=999"></script>
</body>
</html>
